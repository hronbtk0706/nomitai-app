      <h1>ノミタイ - 今夜飲みたい人が見つかるチャットアプリ</h1>
      <p>ノミタイは、今夜飲みに行きたい人同士をリアルタイムでつなげる無料のチャットアプリです。「今日飲みに行きたいけど誰もいない」そんなときに、同じ気持ちの飲み仲間・飲み友を近くで見つけられます。</p>

      <h2>ノミタイの特徴</h2>
      <ul>
        <li>今夜飲みたい人同士をリアルタイムでマッチング</li>
        <li>エリアごとのチャットで地元の飲み友・飲み仲間を募集・探せる</li>
        <li>GPS対応で現在地に近いエリアのチャットに自動参加</li>
        <li>Googleアカウントまたは匿名でかんたんログイン</li>
        <li>「飲みたい！」ボタンで参加意思を表明、取り消しも自由</li>
        <li>画像送信・絵文字リアクション対応のリアルタイムチャット</li>
        <li>完全無料で利用可能</li>
      </ul>

      <h2>こんな人におすすめ</h2>
      <ul>
        <li>今夜飲みに行きたいけど誰も誘える友達がいない</li>
        <li>飲み友・飲み仲間を新しく作りたい</li>
        <li>社会人になって一緒に居酒屋に行ける仲間が減った</li>
        <li>気軽に飲み会に参加したい</li>
        <li>近くで飲み会メンバーを募集・探したい</li>
      </ul>

      <h2>対応エリア</h2>
      <p>北海道・札幌、仙台、東京・渋谷、新宿、池袋、横浜、名古屋、京都、大阪・梅田、難波、神戸、福岡・博多、その他全国各地のエリアに対応。近くの飲みとも・飲み友を探せます。</p>

      <h2>利用方法</h2>
      <ol>
        <li>Googleアカウントでログインするか、匿名で参加</li>
        <li>ニックネーム・年齢層・性別を設定</li>
        <li>エリアを選択（GPS自動検出対応）</li>
        <li>「飲みたい！」ボタンを押して飲み仲間を募集</li>
        <li>チャットで話して待ち合わせ場所を決めよう</li>
      </ol>

      <p>飲み友募集・飲み会参加・飲み仲間探しなら「ノミタイ」。今夜一緒に飲みに行ける人が見つかります。</p>
